# Project configuration consumed by AI agents (Claude, Cursor, Gemini, Codex, etc.)
# when they encounter {{VAR_NAME}} references in skills, commands, templates and docs.
# Variable names are snake_case; the AI maps {{PROJECT_NAME}} -> project.project_name lexically.
# Edit values manually, or run `bun run agents:setup` for an interactive walkthrough.
# Every unfilled field is `null` plus a TODO comment with a concrete example.

project:
  project_name: Bunkai # Brand name for the product (upex-bunkai-tms)
  project_key: BK # Jira project key — source: .agents/project.yaml of target repo
  webapp_domain: bunkai.io # Primary production domain — source: target .agents/project.yaml line 13

backend:
  backend_repo: ../upex-bunkai-tms # Monorepo — backend lives in app/api/ of Next.js project
  backend_stack: Next.js 15 + Supabase # Source: target .agents/project.yaml line 16
  backend_entry: app/api/ # Next.js API route handlers — source: target .agents/project.yaml line 17

frontend:
  frontend_repo: ../upex-bunkai-tms # Monorepo — same Next.js app
  frontend_stack: Next.js 15 + React 19 + TypeScript # Source: target package.json
  frontend_entry: app/ # Source: target .agents/project.yaml line 23

database:
  db_type: PostgreSQL (Supabase) # Source: target .agents/project.yaml line 26

issue_tracker:
  issue_tracker: Jira # Source: target .agents/project.yaml line 29
  issue_tracker_cli: acli # Source: target .agents/project.yaml line 30
  atlassian_url: 'https://upexgalaxy69.atlassian.net' # Source: target .agents/project.yaml line 31

testing:
  default_env: staging # Use staging (not local) for QA — isolates from production
  tms_cli: bun xray # Confirm Xray or Jira-native TMS usage for this project

qa:
  formal_blocked_gate: true # When true and the substrate exposes a `blocked` story status, FAILED stories dispatch `defect_reported` (in_test -> blocked). When false (or no `blocked` slug), the skill leaves the story in `in_test` with the linked bug — non-strict fallback. See sprint-testing/references/sprint-orchestration.md Briefing 4 Step 5.

# Per-environment config. Add/remove environments freely (production, dev, qa, uat, etc.).
# Each environment must define ALL four keys: web_url, api_url, db_mcp, api_mcp.
# Skills referencing {{WEB_URL}} / {{API_URL}} / {{DB_MCP}} / {{API_MCP}} resolve to the
# active environment (`testing.default_env` above, or a session override).
# For explicit cross-env references use {{environments.<env>.<var>}} (e.g. {{environments.local.web_url}}).
environments:
  local:
    web_url: 'http://localhost:3000' # Source: target .agents/project.yaml
    api_url: 'http://localhost:3000/api' # Source: target .agents/project.yaml
    db_mcp: dbhub # DBHub MCP server name for local — fill after .env DBHUB_* setup
    api_mcp: openapi # No separate API MCP — API is same host as web
  staging:
    web_url: 'https://staging-upexbunkai.vercel.app' # Source: target .agents/project.yaml
    api_url: 'https://staging-upexbunkai.vercel.app/api' # Source: target .agents/project.yaml
    db_mcp: dbhub # DBHub MCP server name for staging — same Supabase project (fmbpikzpkafptqximhxn)
    api_mcp: openapi # No separate API MCP — API is same host as staging web
