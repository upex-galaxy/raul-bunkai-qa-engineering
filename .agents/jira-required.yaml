# .agents/jira-required.yaml
#
# Custom fields the methodology requires to be present in your Jira workspace.
# Compare your Jira against this manifest with `bun run jira:check`.
#
# Each entry's KEY is the canonical slug — the value the methodology expects to
# resolve via {{jira.<slug>}}. Your Jira's field name must slugify to this key
# (lowercase, underscores, no emojis/accents — see `bun run jira:sync-fields`
# for the exact transform).
#
# When adding a new skill that needs a new custom field, add an entry here AND
# instruct users (via README) to create the field in their Jira.
#
# Sections:
#   required  — methodology fails without these. `bun run jira:check` exits 1
#               if any are missing or mismatched.
#   optional  — enhance the workflow but won't break it if missing. Reported as
#               INFO by `bun run jira:check`; never affects exit code.
#   unmapped  — fields the methodology references semantically but that have no
#               concrete Jira field yet. Skills mention them as literal markers
#               (e.g. `customfield_ATR`) with TODO comments. Reported as INFO.
#
# Fallback (`fallback:` key, per field):
#   Some custom fields may not exist in every Jira instance. For any field a
#   skill WRITES, declare a `fallback:` so the skill never blocks when the field
#   is absent — it writes the content to the fallback target instead.
#     fallback: { target: comment, label: "Acceptance Test Plan (ATP)" }
#   target — `comment` (default; posts a structured Jira comment headed `## <label>`)
#            or `description` (appends to the issue description).
#   label  — the human heading used in the comment/description block.
#   Contract: scripts/sync-jira-issues.ts emits a pointer stub for an unresolved
#   field's dedicated .md; skills then read the fallback (comments.md/description).
#   Fields with NO `fallback:` are PO/planning-owned (mockup, story_points,
#   weblink) — skills read them, never author them, so no fallback is needed.

required:
  # ---- Story / User-story fields (consumed by scripts/sync-jira-issues.ts) ----
  acceptance_criteria:
    name: ✅ Acceptance Criteria (Gherkin)
    type: string
    fallback: { target: comment, label: Acceptance Criteria }
    description: Gherkin-formatted acceptance criteria attached to user stories.
    used_by: [sync-jira-issues]

  acceptance_test_results:
    name: 🧪 Acceptance Test Results (ATR)
    type: string
    fallback: { target: comment, label: Acceptance Test Results (ATR) }
    description: |
      Stores the QA test report (ATR) on the Story (Modality jira-native). Authored in-session
      and written to this field; when the field is absent it falls back to a `## Acceptance Test
      Results (ATR)` Jira comment. Modality jira-xray teams use a separate Test Execution issue.
    used_by: [sprint-testing, test-documentation]

  business_rules_specification:
    name: 🚩Business Rules Specification
    type: string
    fallback: { target: comment, label: Business Rules Specification }
    description: 'Business rules tied to a user story, separate from acceptance criteria.'
    used_by: [sync-jira-issues]

  scope:
    name: Scope ⛳
    type: string
    fallback: { target: comment, label: Scope }
    description: In-scope items only — what the story IS expected to deliver. Exclusions live in the separate `out_of_scope` field.
    used_by: [sync-jira-issues]

  out_of_scope:
    name: 🏴 Out Of Scope
    type: string
    fallback: { target: comment, label: Out Of Scope }
    description: Explicit exclusions from the story scope — what this story is NOT going to deliver. Complementary to `scope`.
    used_by: [sync-jira-issues]

  mockup:
    name: Mockup 🎴
    type: string
    description: Link or embed of the design mockup for the story.
    used_by: [sync-jira-issues]

  workflow:
    name: 🧬WORKFLOW
    type: string
    fallback: { target: comment, label: Workflow }
    description: User journey / workflow narrative for the story.
    used_by: [sync-jira-issues]

  story_points:
    name: Story Points
    type: number
    description: Agile estimate for the story (planning poker).
    used_by: [sync-jira-issues]

  weblink:
    name: Weblink (URL) 🌍️
    type: string
    description: External reference URL attached to the story.
    used_by: [sync-jira-issues]

  # ---- Epic + Story planning fields (Dev/QA) — referenced by scripts/sync-jira-issues.ts
  # SLUG_MAPPING and materialized as per-field .md files. Shared with the dev boilerplate
  # so a single Jira workspace serves both repos; absent fields degrade to a sync stub. ----
  feature_test_plan:
    name: 🧪 Feature Test Plan (QA)
    type: string
    fallback: { target: comment, label: Feature Test Plan (QA) }
    description: |
      Epic-level QA test plan (strategy + coverage approach for the whole feature/epic).
      Authored by sprint-testing/feature-test-planning, written to this field, then synced
      to `.context/PBI/epics/EPIC-<KEY>-<slug>/feature-test-plan.md`.
    used_by: [sprint-testing, sync-jira-issues]

  feature_implementation_plan:
    name: Feature Implementation Plan (Dev)🛠️
    type: string
    fallback: { target: comment, label: Feature Implementation Plan (Dev) }
    description: |
      Epic-level technical implementation plan (Dev side). Cross-repo field shared with the
      dev boilerplate; the QA sync materializes it as `feature-implementation-plan.md` when present.
    used_by: [sync-jira-issues]

  spec_implementation_plan:
    name: Spec Implementation Plan (Dev)🛠️
    type: string
    fallback: { target: comment, label: Spec Implementation Plan (Dev) }
    description: |
      Story-level technical implementation plan (Dev side). Cross-repo field shared with the
      dev boilerplate; the QA sync materializes it as `implementation-plan.md` when present.
    used_by: [sync-jira-issues]

  # ---- Bug / Defect fields (consumed by scripts/sync-jira-issues.ts + sprint-testing reporting) ----
  actual_result:
    name: 🐞 Actual Result (Comportamiento)
    type: string
    fallback: { target: comment, label: Actual Result }
    description: Observed behavior captured during bug repro.
    used_by: [sync-jira-issues, sprint-testing]

  expected_result:
    name: ✅ Expected Result (Output)
    type: string
    fallback: { target: comment, label: Expected Result }
    description: 'Expected behavior per acceptance criteria, contrasted against the bug.'
    used_by: [sync-jira-issues, sprint-testing]

  error_type:
    name: Error Type
    type: option
    fallback: { target: comment, label: Error Type }
    options: [content, crash, data, functional, integration, performance, security, visual]
    description: Bug taxonomy by error category.
    used_by: [sync-jira-issues, sprint-testing]

  severity:
    name: Severity 🚩
    type: option
    fallback: { target: comment, label: Severity }
    options: [critica, mayor, menor, moderada, trivial]
    description: Bug severity classification (impact-based).
    used_by: [sync-jira-issues, sprint-testing]

  test_environment:
    name: Test Environment 📦️
    type: option
    fallback: { target: comment, label: Test Environment }
    options: [dev, production, qa, staging, uat]
    description: Environment where the bug was reproduced or where the test ran.
    used_by: [sync-jira-issues, sprint-testing]

  root_cause:
    name: Root Cause🐞
    type: option
    fallback: { target: comment, label: Root Cause }
    options:
      - code_error
      - config_env_error
      - data_error
      - environment_error
      - integration_error
      - requirement_error
      - third_party_error
      - working_as_designed
    description: 'Post-mortem cause classification, set after the fix.'
    used_by: [sync-jira-issues, sprint-testing]

  workaround:
    name: 🚩 Workaround
    type: string
    fallback: { target: comment, label: Workaround }
    description: Temporary mitigation steps to unblock users until the fix ships.
    used_by: [sync-jira-issues, sprint-testing]

  evidence:
    name: 🧫EVIDENCE
    type: string
    fallback: { target: comment, label: Evidence }
    description: 'Bug evidence: screenshots, traces, logs, repro recordings.'
    used_by: [sync-jira-issues, sprint-testing]

  fix:
    name: Fix
    type: option
    fallback: { target: comment, label: Fix }
    options: [bugfix, hotfix]
    description: Type of fix applied (bugfix vs urgent hotfix).
    used_by: [sync-jira-issues, sprint-testing]

  # ---- TMS Modality jira-native fields (no Xray) ----
  acceptance_test_plan:
    name: 🧪 Acceptance Test Plan (ATP)
    type: string
    fallback: { target: comment, label: Acceptance Test Plan (ATP) }
    description: |
      Stores the QA Acceptance Test Plan body on the Story itself (Modality jira-native).
      Authored in-session and written to this field; when the field is absent it falls back to
      a `## Acceptance Test Plan (ATP)` Jira comment. Modality jira-xray teams use a separate
      Test Plan issue and may not need this field.
    used_by: [sprint-testing, test-documentation]

  test_status:
    name: Test Status🧪
    type: option
    fallback: { target: comment, label: Test Status }
    options: [blocked, failed, n_r, passed]
    description: Per-Test issue execution status (Jira-native TMS).
    used_by: [test-documentation]

optional:
  # Fields that enhance the workflow but won't break it if missing.
  to_be_automated:
    name: To Be Automated (QA)🧪
    type: option
    fallback: { target: comment, label: To Be Automated }
    options: [yes, no]
    description: Whether the Test should be automated (ROI verdict from test-documentation).
    used_by: [test-documentation]

# Special markers — fields the methodology expects to exist semantically but
# that haven't been mapped to a real Jira custom field yet. The check command
# treats these as informational (not errors). When a real field is configured,
# move the entry to `required:` above and update the corresponding skill files
# to use {{jira.<slug>}} instead of the literal customfield_X marker.
unmapped:
# (No unmapped slugs at this time. See README §5.3 for the unmapped pattern
# — declare a slug here when the methodology expects a field semantically but
# no real Jira field exists yet, then promote it to `required:` once configured.)

# Issue-link types the QA methodology needs for traceability between work items
# (Story↔Test coverage, Story↔Defect causality, Story-blocked gates). Slug-based
# so workspaces with custom link-type names can override. Resolved per workspace
# by `bun run jira:sync-link-types` → `.agents/jira-link-types.json`.
#
# NEVER hardcode link-type names ("Test", "Blocks", "Problem/Incident") in skill
# content. Always resolve via {{jira.link_types.<slug>}}, .outward, .inward,
# .fallback. Creation doctrine + the acli --out/--in inversion gotcha live in
# agentic-qa-core/references/traceability-linking.md.
#
# NOTE: Test↔Test Set membership is NOT a Jira issuelink — it is Xray-internal;
# handle via /xray-cli, never `acli link create`.
link_types:
  required:
    test:
      name: Test
      outward: tests
      inward: is tested by
      description: |
        Coverage edge — a Story is tested by a Test / Test Plan / Test Execution
        artifact. The canonical Story↔test-artifact traceability link.
      fallback: relates
      used_by:
        - sprint-testing
        - shift-left-testing
        - test-documentation
        - regression-testing

    problem_incident:
      name: Problem/Incident
      outward: causes
      inward: is caused by
      description: |
        Causal edge — a Story causes a Bug/Defect found during QA. The workspace
        link type is named "Problem/Incident"; semantics are causes / is caused by.
      fallback: relates
      used_by:
        - sprint-testing
        - regression-testing

    blocks:
      name: Blocks
      outward: blocks
      inward: is blocked by
      description: |
        Blocking edge — an open Bug/Defect/Story/Tech Story/Tech Debt blocks a
        Story. Created when the defect_reported → blocked QA gate fires.
      fallback: blocking
      used_by:
        - sprint-testing
        - regression-testing

  optional:
    relates:
      name: Relates
      outward: relates to
      inward: relates to
      description: |
        Symmetric, informational link. Degradation target when a directional type
        is absent — consumers MUST flag the fallback (direction is lost).
      fallback: null
      used_by: [sprint-testing, test-documentation]

    defect:
      name: Defect
      outward: created
      inward: created by
      description: Alt to problem_incident — a Story created a Defect (Defect link variant).
      fallback: problem_incident
      used_by: [sprint-testing]

    test_design:
      name: Test Design
      outward: designs
      inward: is designed by
      description: Xray refinement — Test Plan-level design coverage link.
      fallback: test
      used_by: [test-documentation, xray-cli]

    test_execute:
      name: Test Execute
      outward: executes
      inward: is executed by
      description: Xray refinement — Test Execution coverage link.
      fallback: test
      used_by: [test-documentation, xray-cli, sprint-testing]

    test_automation:
      name: Test Automation
      outward: automation test for
      inward: is automated by
      description: Links a manual Test to its automation.
      fallback: relates
      used_by: [test-automation]

    blocking:
      name: Blocking
      outward: blocks
      inward: is blocked by
      description: Duplicate of Blocks in this workspace (separate id); fallback for blocks.
      fallback: blocks
      used_by: [sprint-testing]

    xray_defect:
      name: Xray Defect
      outward: created
      inward: created by
      description: Xray-managed defect creation link.
      fallback: defect
      used_by: [xray-cli, sprint-testing]

# Issue types (`work_types`) plus the canonical statuses + transitions the
# methodology requires per work type. Validated by `bun run jira:check` against
# the catalog at `.agents/jira-workflows.json`. Status / transition slugs are
# agnostic — the literal Jira name lives in `jira-workflows.json`, resolved
# per workspace by `bun run jira:sync-workflows` (interactive on first run,
# idempotent after). Status categories are not declared here — they're
# discovered by the sync.
work_types:
  story:
    jira_issue_type: Story
    description: User story / feature work item
    sync: default
    coverable: true
    content: split
    required_statuses:
      backlog: { description: Initial state for a freshly created story }
      shift_left_qa: { description: Story under early QA review (shift-left quality check) }
      estimation: { description: Story being estimated (planning poker / sizing) }
      ready_for_dev: { description: Estimated and ready to be picked up by a developer }
      in_progress: { description: Developer actively working }
      in_review: { description: Pull request open / code review }
      ready_for_qa: { description: Deployed and ready for QA to test }
      in_test: { description: QA actively testing }
      blocked:
        description: QA blocked release due to open defect; dev resumes via fix_defect transition

      qa_approved: { description: QA passed; story is verified (terminal QA verdict) }
      ready_for_release: { description: QA-approved and queued for the next release window }
      deployed_to_production: { description: Released to production (terminal success state) }
      aborted: { description: Story cancelled / will not be delivered (terminal) }
    required_transitions:
      # ---- Forward path ----
      analyze:
        from: backlog
        to: shift_left_qa
        description: QA pulls a backlog item for early shift-left review

      ready_to_estimate:
        { from: backlog, to: estimation, description: Story sized for planning poker }
      estimate:
        { from: shift_left_qa, to: estimation, description: 'After shift-left QA, send to sizing' }
      estimated_and_ready_to_work:
        { from: estimation, to: ready_for_dev, description: Sized and ready for dev pickup }
      start_working:
        { from: ready_for_dev, to: in_progress, description: Developer picks up the story }
      pull_request: { from: in_progress, to: in_review, description: PR opened }
      pushed:
        { from: in_progress, to: ready_for_qa, description: 'Skip review, push directly to QA' }
      deployed: { from: in_review, to: ready_for_qa, description: 'PR merged & deployed to QA env' }
      start_testing: { from: ready_for_qa, to: in_test, description: QA begins testing }
      qa_sign_off:
        from: in_test
        to: qa_approved
        description: "QA approves the story (the canonical 'Tested' transition)"

      include_in_release:
        from: qa_approved
        to: ready_for_release
        description: Story queued for the next release window

      released:
        from: ready_for_release
        to: deployed_to_production
        description: Released to production

      # ---- Defect / Blocked flow (formal FAILED gate) ----
      defect_reported:
        from: in_test
        to: blocked
        description: 'QA blocks release due to open defect (formal FAILED gate; only available when {{QA_FORMAL_BLOCKED_GATE}}=true and substrate exposes the `blocked` status)'

      fix_defect:
        from: blocked
        to: in_progress
        description: Dev resumes work to fix the blocking defect

      back_from_blocked:
        from: blocked
        to: in_test
        description: 'QA un-blocks without dev rework (e.g. invalid defect, retest after external fix)'

      # ---- Back / rework transitions ----
      back_from_in_test:
        from: in_test
        to: ready_for_qa
        description: 'QA returns the story to the queue (e.g. wrong build, environment issue)'

      back_from_qa_approved:
        from: qa_approved
        to: in_test
        description: Re-open QA after sign-off (e.g. regression discovered)

      back_from_in_progress:
        { from: in_progress, to: ready_for_dev, description: Dev returns story to ready_for_dev }
      back_from_estimation:
        { from: estimation, to: backlog, description: Cannot estimate — return to backlog }
      back_from_shift_left_qa:
        from: shift_left_qa
        to: backlog
        description: Shift-left QA cannot proceed — return to backlog

      # ---- Terminal / abort ----
      aborted: { from: any, to: aborted, description: Cancel the story (global transition) }
      recover:
        from: aborted
        to: ready_for_dev
        description: Restore an aborted story back to ready_for_dev

    used_by: [acli, sprint-testing, test-documentation, project-discovery]

  bug:
    jira_issue_type: Bug
    description: Defect / bug work item
    sync: default
    coverable: true
    content: single
    local_dir: bugs
    required_statuses:
      open: { description: Newly reported bug awaiting triage }
      in_progress: { description: Developer actively fixing }
      in_review: { description: Pull request open }
      ready_for_qa: { description: Fix deployed; bug ready to retest }
      closed: { description: "Bug verified fixed (canonical 'verified' terminal)" }
      deferred: { description: Bug accepted but postponed; resumable via resume_fix }
      cannot_reproduce: { description: Bug closed because the team cannot reproduce (terminal) }
      duplicated: { description: Bug closed as duplicate of another (terminal) }
      rejected: { description: Bug rejected as Working As Designed / WAD (terminal) }
      enhancement: { description: Reclassified as enhancement / feature request (terminal) }
      aborted: { description: Bug abandoned without fix (terminal) }
    required_transitions:
      # ---- Triage from open ----
      start_fixing:
        { from: open, to: in_progress, description: Developer starts working on the bug }
      is_cnr: { from: open, to: cannot_reproduce, description: Cannot reproduce — close (terminal) }
      defer: { from: open, to: deferred, description: Postpone the fix }
      is_duplicated: { from: open, to: duplicated, description: Bug is a duplicate of another }
      is_wad: { from: open, to: rejected, description: Working as designed — reject the bug }
      is_not_a_bug:
        { from: open, to: enhancement, description: Reclassify as enhancement / feature request }
      # ---- Forward / fix path ----
      pull_request: { from: in_progress, to: in_review, description: PR opened }
      hard_pushed:
        { from: in_progress, to: ready_for_qa, description: 'Skip review, push directly to QA' }
      fixed_and_deployed:
        from: in_review
        to: ready_for_qa
        description: 'PR merged & deployed; bug ready to retest'

      retest_passed:
        from: ready_for_qa
        to: closed
        description: "QA verifies the fix (the canonical 'Tested / VERIFIED' transition for bugs)"

      # ---- Re-open / regression ----
      re_open:
        from: any
        to: open
        description: Re-open a closed bug (global transition — accepts any source state)

      back:
        from: closed
        to: ready_for_qa
        description: Re-test required after close (regression caught after sign-off)

      resume_fix: { from: deferred, to: in_progress, description: Resume work on a deferred bug }
      # ---- Abort ----
      aborted: { from: any, to: aborted, description: Abandon the bug (global transition) }
    used_by: [acli, sprint-testing]

  test_case:
    jira_issue_type: Test
    description: Test case (TC) work item
    sync: never
    local_dir: tests
    required_statuses:
      draft: { description: 'Just created, not yet designed' }
      in_design: { description: Test scenario being authored }
      ready: { description: Designed and ready to run / consider for automation }
      in_review: { description: Under automation review (ROI evaluation) }
      candidate: { description: Approved as automation candidate }
      in_automation: { description: Being automated }
      pull_request: { description: Automation PR open for review }
      automated: { description: Merged automated test (terminal success) }
      manual: { description: Terminal manual-only verdict }
      deprecated: { description: TC retired (terminal); recoverable via recover transition }
    required_transitions:
      # ---- Forward path ----
      start_design: { from: draft, to: in_design, description: Begin designing the TC }
      ready_to_run: { from: in_design, to: ready, description: TC designed and ready }
      automation_review_from_ready:
        { from: ready, to: in_review, description: Move a Ready TC into ROI review }
      automation_review_from_draft:
        from: draft
        to: in_review
        description: Move a Draft TC into ROI review (skip in_design)

      automation_review_from_manual:
        { from: manual, to: in_review, description: Re-evaluate a Manual TC for automation }
      approve_to_automate:
        { from: in_review, to: candidate, description: Reviewer approves automation }
      start_automation:
        { from: candidate, to: in_automation, description: Engineer starts automating }
      create_pr: { from: in_automation, to: pull_request, description: Open the automation PR }
      merged:
        from: pull_request
        to: automated
        description: Automation PR merged (terminal success)

      automated_from_manual:
        from: manual
        to: automated
        description: Manual TC eventually automated (skips PR step)

      # ---- Manual-verdict paths ----
      for_manual: { from: ready, to: manual, description: Mark a Ready TC as manual-only (low ROI) }
      manual_execution_from_candidate:
        from: candidate
        to: manual
        description: Send a Candidate back to Manual after re-evaluation

      manual_execution_from_automated:
        from: automated
        to: manual
        description: Demote an Automated TC to Manual (e.g. flaky)

      for_automation: { from: manual, to: candidate, description: Promote a Manual TC to Candidate }
      fix:
        from: automated
        to: pull_request
        description: Fix a failing automated TC (open a new PR)

      # ---- Back / rework ----
      back_from_in_design: { from: in_design, to: draft, description: Rework the design }
      back_from_ready: { from: ready, to: in_design, description: Send Ready TC back to design }
      back_from_in_review:
        { from: in_review, to: ready, description: ROI rejected — leave as Ready }
      back_from_candidate: { from: candidate, to: in_review, description: Rescind candidate status }
      back_from_in_automation:
        { from: in_automation, to: candidate, description: Pause automation work }
      back_from_pull_request:
        from: pull_request
        to: in_automation
        description: PR rejected — return to in_automation

      # ---- Deprecate ----
      deprecated: { from: any, to: deprecated, description: Retire the TC (global transition) }
      recover: { from: deprecated, to: draft, description: Restore a deprecated TC back to draft }
    used_by: [test-documentation, test-automation]

  # ---- Registry-only types (coverage sync). Workflows (statuses/transitions) are
  # resolved by `bun run jira:sync-workflows` per workspace when these types exist;
  # the keys below drive `sync-jira-issues.ts` coverage routing. ----
  epic:
    jira_issue_type: Epic
    description: Epic / feature container (holds child stories)
    sync: default
    container: true
    content: split
    local_dir: epics
    required_statuses:
      backlog: { description: Newly created epic awaiting planning }
      planning: { description: Epic being planned / scoped (default landing state after creation) }
      in_progress: { description: Epic actively in development }
      done: { description: Epic completed (terminal success) }
      aborted: { description: Epic cancelled (terminal) }
    required_transitions:
      plan: { from: backlog, to: planning, description: Move a backlog epic into planning }
      ready_to_work:
        { from: planning, to: in_progress, description: 'Planning done, epic work begins' }
      complete: { from: in_progress, to: done, description: Epic finished }
      aborted: { from: any, to: aborted, description: Cancel the epic (global transition) }

  defect:
    jira_issue_type: Defect
    description: Defect found during QA of a coverable issue (story / bug / etc.)
    sync: discovery
    coverable: true
    content: single
    local_dir: defects
    defect_link_types: [problem_incident, blocks, blocking, defect, xray_defect]
    required_statuses:
      open: { description: Newly reported defect awaiting triage }
      in_progress: { description: Developer actively fixing }
      in_review: { description: Pull request open }
      ready_for_qa: { description: Fix deployed; defect ready to retest }
      closed: { description: Defect verified fixed (terminal) }
      deferred: { description: Defect accepted but postponed; resumable via resume_fix }
      cannot_reproduce: { description: Defect closed because the team cannot reproduce (terminal) }
      duplicated: { description: Defect closed as duplicate of another (terminal) }
